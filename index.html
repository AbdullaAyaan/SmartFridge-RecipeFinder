<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fridge</title>
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- end here -->
 <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- end gere -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="header">
            <img src="./logo.png" alt="logo">
            <div class="header-text">
                <h1>Smart Fridge</h1>
                <p>"Turn Ingredients to Recipe"</p>
            </div>
        </div>
        <main class="main-body">
            <section class="left">
                <div class="left-top">
                <h2>Your Fridge</h2>
                <label for="search">
                    <input type="search" id="inp-search">
                </label>
                </div>
                <div class="left-bottom">
                    <div class="active-tag">
                        <h3>Selected Ingredients</h3>
                        <div class="selected">
                           
                        </div>
                    </div>
                    <div class="add-on">
                        <h3>Quick-Add Common Categories</h3>
                        <div class="icon-container">

                        </div>
                    </div>
                    <div class="stocked">
                    </div>
                </div>
            </section>
            <section class="right">
                <div class="right-top">
                    <h2>What You Can Cook</h2>
                </div>
                <div class="dishes">
                    
            

                </div>
            </section>
        </main>
    </div>
    <div class="modal">
        <div class="bg"></div>
        <div class="modal-card">
            <div class="card-left">
                <div class="photo">
                    <img id="modal-img" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D" alt="">
                </div>
                <div class="list">
                    <h4>Ingredients List</h4>
                    <ul class="list-items">
                      
                    </ul>
                    <h4>Missing Items</h4>
                    <ul class="missing-list">
                       
                        
                    </ul>

                </div>
                <div class="nutrients">
                    <h4>Macro-nutrients/ Calories</h4>
                    <div class="cal">
                        <p>Calories <span id="calo">305g</span></p>
                        <p>Fat <span id="fat">6g</span></p>
                    </div>
                </div>
            </div>
            <div class="card-right">
                <h2></h2>
                <div class="guide">
                    <h3>Step-By-Step Cooking Instructions</h3>
                    <ol class="guide-list">
                       
                    </ol>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
